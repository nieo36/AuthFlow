<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Geo Tagger Auth App</title>
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>

  <body class="bg-gray-100 min-h-screen font-sans">
    
    <nav class="bg-white shadow px-6 py-4 flex justify-between items-center">
      <div class="font-bold text-xl text-blue-600">GeoSecure</div>
      <div class="space-x-4">
        <button id="nav-login" class="text-gray-600 hover:text-blue-600 font-medium">Login</button>
        <button id="nav-register" class="text-gray-600 hover:text-blue-600 font-medium">Register</button>
        <button id="nav-logout" class="text-red-600 hover:text-red-800 font-medium hidden">Logout</button>
      </div>
    </nav>

    <div id="message-box" class="max-w-md mx-auto mt-4 text-center font-medium h-6"></div>

    <div class="p-6">
      <section id="register-section" class="max-w-md mx-auto bg-white rounded-2xl shadow p-6 hidden">
        <h2 class="text-2xl font-bold text-gray-800 mb-4">Register</h2>
        <form id="register-form" class="space-y-4">
          <input type="text" id="reg-name" placeholder="Name" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <input type="email" id="reg-email" placeholder="Email" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <input type="password" id="reg-password" placeholder="Password" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">Register</button>
        </form>
      </section>

      <section id="login-section" class="max-w-md mx-auto bg-white rounded-2xl shadow p-6">
        <h2 class="text-2xl font-bold text-gray-800 mb-4">Login</h2>
        <form id="login-form" class="space-y-4">
          <input type="email" id="login-email" placeholder="Email" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <input type="password" id="login-password" placeholder="Password" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">Login</button>
        </form>
      </section>

      <section id="dashboard-section" class="hidden">
        <div class="mb-6">
          <h1 class="text-3xl font-bold text-gray-800">Geo Tagger <span id="user-greeting" class="text-lg text-gray-500 font-normal"></span></h1>
          <div class="w-16 h-1 bg-blue-500 mt-2 rounded"></div>
        </div>

        <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="bg-white rounded-2xl shadow p-5">
            <h2 class="text-xl font-semibold mb-4">Add Store</h2>
            <input id="storeid" placeholder="Store ID" class="w-full mb-3 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
            <input id="address" placeholder="Address" class="w-full mb-4 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
            <button id="addBtn" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">Add Store</button>
          </div>

          <div class="md:col-span-2 bg-white rounded-2xl shadow p-3">
            <div id="map" class="w-full h-[500px] rounded-xl relative z-0"></div>
          </div>
        </div>
      </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
